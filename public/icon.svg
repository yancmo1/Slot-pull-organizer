<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="slot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#475569;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Slot machine body -->
  <g transform="translate(106, 80)">
    <!-- Main body -->
    <rect x="0" y="60" width="300" height="340" rx="20" fill="url(#slot)" stroke="#64748b" stroke-width="4"/>

    <!-- Display area -->
    <rect x="20" y="90" width="260" height="140" rx="10" fill="#0f172a" stroke="#64748b" stroke-width="3"/>

    <!-- 7 symbols with glow -->
    <g filter="url(#glow)">
      <text x="60" y="180" font-size="80" font-weight="bold" fill="url(#gold)" font-family="Arial, sans-serif">7</text>
      <text x="140" y="180" font-size="80" font-weight="bold" fill="url(#gold)" font-family="Arial, sans-serif">7</text>
      <text x="220" y="180" font-size="80" font-weight="bold" fill="url(#gold)" font-family="Arial, sans-serif">7</text>
    </g>

    <!-- Top decoration -->
    <ellipse cx="150" cy="30" rx="80" ry="30" fill="#ef4444" opacity="0.9"/>
    <text x="150" y="45" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial, sans-serif">JACKPOT</text>

    <!-- Buttons -->
    <circle cx="60" cy="280" r="25" fill="#ef4444" stroke="#dc2626" stroke-width="3"/>
    <circle cx="150" cy="280" r="25" fill="#22c55e" stroke="#16a34a" stroke-width="3"/>
    <circle cx="240" cy="280" r="25" fill="#eab308" stroke="#ca8a04" stroke-width="3"/>

    <!-- Lever -->
    <rect x="280" y="140" width="15" height="100" rx="8" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <circle cx="287.5" cy="135" r="20" fill="#ef4444" stroke="#dc2626" stroke-width="3"/>

    <!-- Coin slot -->
    <rect x="120" y="330" width="60" height="8" rx="4" fill="#0f172a" stroke="#64748b" stroke-width="2"/>

    <!-- Display lights -->
    <circle cx="30" cy="110" r="8" fill="#fbbf24" opacity="0.8"/>
    <circle cx="270" cy="110" r="8" fill="#fbbf24" opacity="0.8"/>
    <circle cx="30" cy="210" r="8" fill="#fbbf24" opacity="0.8"/>
    <circle cx="270" cy="210" r="8" fill="#fbbf24" opacity="0.8"/>
  </g>
</svg>
